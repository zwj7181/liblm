  <style>
    body,
    html {
      font-family: Roboto, 'Helvetica Neue', Helvetica, Tahoma, Arial, 'PingFang SC', 'Microsoft YaHei';
      margin: 0;
      padding: 0
    }

    .loader {
      width: 100vw;
      height: 100vh;
      background-color: #f0f2f5;
      position: fixed;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .loader .loader-inner {
      display: flex;
      align-items: center
    }

    .loader .tooltip {
      margin-left: 5px;
      font-size: 14px;
      color: #0e318d
    }

    .ant-spin-dot-spin {
      position: relative;
      display: inline-block;
      font-size: 20px;
      width: 20px;
      height: 20px;
      transform: rotate(45deg);
      animation: antRotate 1.2s infinite linear
    }

    .ant-spin-dot-spin i {
      width: 9px;
      height: 9px;
      border-radius: 100%;
      background-color: #0e318d;
      transform: scale(.75);
      display: block;
      position: absolute;
      opacity: .3;
      animation: antSpinMove 1s infinite linear alternate;
      transform-origin: 50% 50%
    }

    .ant-spin-dot-spin i:first-child {
      left: 0;
      top: 0
    }

    .ant-spin-dot-spin i:nth-child(2) {
      right: 0;
      top: 0;
      animation-delay: .4s
    }

    .ant-spin-dot-spin i:nth-child(3) {
      right: 0;
      bottom: 0;
      animation-delay: .8s
    }

    .ant-spin-dot-spin i:nth-child(4) {
      left: 0;
      bottom: 0;
      animation-delay: 1.2s
    }

    @keyframes antSpinMove {
      to {
        opacity: 1
      }
    }

    @keyframes antRotate {
      to {
        transform: rotate(405deg)
      }
    }

    .shake-slow {
      animation-name: shake-slow;
      animation-duration: 5s;
      animation-iteration-count: infinite;
      animation-timing-function: ease-in-out;
      animation-delay: 0s;
      animation-play-state: running
    }

    @keyframes shake-slow {
      0% {
        transform: translate(0, 0) rotate(0)
      }

      2% {
        transform: translate(6px, -7px) rotate(2.5deg)
      }

      4% {
        transform: translate(8px, -8px) rotate(2.5deg)
      }

      6% {
        transform: translate(1px, -8px) rotate(-3.5deg)
      }

      8% {
        transform: translate(-3px, 4px) rotate(-.5deg)
      }

      10% {
        transform: translate(0, -3px) rotate(1.5deg)
      }

      12% {
        transform: translate(-1px, 2px) rotate(.5deg)
      }

      14% {
        transform: translate(6px, 6px) rotate(-1.5deg)
      }

      16% {
        transform: translate(-7px, 4px) rotate(-.5deg)
      }

      18% {
        transform: translate(7px, 8px) rotate(-3.5deg)
      }

      20% {
        transform: translate(-6px, 2px) rotate(1.5deg)
      }

      22% {
        transform: translate(9px, 5px) rotate(-1.5deg)
      }

      24% {
        transform: translate(7px, -2px) rotate(.5deg)
      }

      26% {
        transform: translate(-7px, -10px) rotate(-.5deg)
      }

      28% {
        transform: translate(-10px, -8px) rotate(-1.5deg)
      }

      30% {
        transform: translate(8px, 4px) rotate(.5deg)
      }

      32% {
        transform: translate(0, 4px) rotate(1.5deg)
      }

      34% {
        transform: translate(-8px, 6px) rotate(-.5deg)
      }

      36% {
        transform: translate(-5px, 7px) rotate(1.5deg)
      }

      38% {
        transform: translate(-4px, -4px) rotate(-1.5deg)
      }

      40% {
        transform: translate(9px, 4px) rotate(-1.5deg)
      }

      42% {
        transform: translate(9px, -5px) rotate(2.5deg)
      }

      44% {
        transform: translate(-5px, -4px) rotate(-2.5deg)
      }

      46% {
        transform: translate(7px, -7px) rotate(1.5deg)
      }

      48% {
        transform: translate(-5px, 8px) rotate(.5deg)
      }

      50% {
        transform: translate(9px, 1px) rotate(-1.5deg)
      }

      52% {
        transform: translate(-9px, -5px) rotate(-3.5deg)
      }

      54% {
        transform: translate(-2px, 9px) rotate(1.5deg)
      }

      56% {
        transform: translate(6px, -1px) rotate(1.5deg)
      }

      58% {
        transform: translate(-6px, 0) rotate(-.5deg)
      }

      60% {
        transform: translate(3px, 1px) rotate(1.5deg)
      }

      62% {
        transform: translate(5px, -7px) rotate(-.5deg)
      }

      64% {
        transform: translate(9px, 2px) rotate(2.5deg)
      }

      66% {
        transform: translate(6px, 0) rotate(-2.5deg)
      }

      68% {
        transform: translate(5px, -4px) rotate(-2.5deg)
      }

      70% {
        transform: translate(-8px, 5px) rotate(-2.5deg)
      }

      72% {
        transform: translate(-6px, -2px) rotate(.5deg)
      }

      74% {
        transform: translate(-3px, 7px) rotate(-3.5deg)
      }

      76% {
        transform: translate(-7px, -8px) rotate(-3.5deg)
      }

      78% {
        transform: translate(-1px, -2px) rotate(2.5deg)
      }

      80% {
        transform: translate(8px, 6px) rotate(-2.5deg)
      }

      82% {
        transform: translate(-2px, -9px) rotate(2.5deg)
      }

      84% {
        transform: translate(8px, -10px) rotate(-.5deg)
      }

      86% {
        transform: translate(-6px, 0) rotate(2.5deg)
      }

      88% {
        transform: translate(-1px, 9px) rotate(-3.5deg)
      }

      90% {
        transform: translate(-7px, 8px) rotate(1.5deg)
      }

      92% {
        transform: translate(-10px, -8px) rotate(.5deg)
      }

      94% {
        transform: translate(-8px, 6px) rotate(1.5deg)
      }

      96% {
        transform: translate(4px, -9px) rotate(2.5deg)
      }

      98% {
        transform: translate(-4px, 9px) rotate(.5deg)
      }
    }

    .hover-shadow {
      transition: all .2s
    }

    .hover-shadow:hover {
      box-shadow: 4px 4px 8px 0 #aaa;
      transform: translateY(-2px)
    }
  </style>
